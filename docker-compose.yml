services:
  offensive-fortunes:
    image: offensive-fortunes
    ports:
      - "6724:6724"
    environment:
      - ASPNETCORE_HTTP_PORTS=6724
    volumes:
      - /usr/share/games/fortunes/off:/usr/share/games/fortunes/off
      - offensive-fortune-db:/App/data
    restart: unless-stopped

volumes:
  offensive-fortune-db:
